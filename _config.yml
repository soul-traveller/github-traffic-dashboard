theme: jekyll-theme-cayman
markdown: kramdown

title: "Script solution to generate GitHub traffic dashboard with graphs and statistics."
description: "Loads historical traffic data from history.json. Generates graphs for different time intervals (daily, weekly, bi-weekly, cumulative). Calculates statistics for 30 days, 90 days, and lifetime. Updates README.md with statistics and embedded graph images. Handles up to 14 consecutive days of server downtime with automatic recovery."
author: "Knut Larsson"
lang: en
