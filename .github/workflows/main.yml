name: Collect GitHub Traffic

on:
  schedule:
    - cron: "0 2 * * *"   # every day
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
jobs:
  # This workflow contains a single job called "traffic"
  traffic:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install matplotlib

      - name: Fetch traffic via API
        run: |
          set -e
          
          repos=(
            "soul-traveller/Argyll_Printer_Profiler"
            "soul-traveller/Toggle_Display_Profile"
            "soul-traveller/rectarg"
          )

          echo "[]" > traffic.json

          for repo in "${repos[@]}"; do
            echo "Fetching $repo"
          
            clones=$(curl -s \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.TRAFFIC_ACTION_TOKEN }}" \
              https://api.github.com/repos/$repo/traffic/clones)
          
            views=$(curl -s \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.TRAFFIC_ACTION_TOKEN }}" \
              https://api.github.com/repos/$repo/traffic/views)
          
            referrers=$(curl -s \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.TRAFFIC_ACTION_TOKEN }}" \
              https://api.github.com/repos/$repo/traffic/popular/referrers)

            # JSON validation
            echo "$clones" | jq . > /dev/null || { echo "❌ Invalid clones JSON for $repo"; echo "$clones"; exit 1; }
            echo "$views" | jq . > /dev/null || { echo "❌ Invalid views JSON for $repo"; echo "$views"; exit 1; }
            echo "$referrers" | jq . > /dev/null || { echo "❌ Invalid referrers JSON for $repo"; echo "$referrers"; exit 1; }
            jq --arg repo "$repo" \
               --arg date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
               --argjson clones "$clones" \
               --argjson views "$views" \
               --argjson ref "$referrers" \
               '. + [{
                  "repository": $repo,
                  "timestamp": $date,
                  "clones": $clones,
                  "views": $views,
                  "referrers": $ref
               }]' \
               traffic.json > tmp.json
          
            mv tmp.json traffic.json
          done

      - name: Save history
        run: |
          if [ -f history.json ]; then
            jq -s '.[0] + .[1]' history.json traffic.json > tmp.json
            mv tmp.json history.json
          else
            cp traffic.json history.json
          fi
      
      - name: Debug output
        run: |
          echo "Traffic.json:"
          cat traffic.json | head -n 50

      - name: Show history.json
        run: cat history.json | head -n 100
  
      - name: Prepare folders
        run: mkdir -p graphs

      - name: Generate dashboard
        run: python scripts/generate_dashboard.py
        
      - name: Commit data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git diff --quiet && echo "No changes" || (
            git add history.json README.md graphs/
            git commit -m "Update traffic dashboard"
            git push
          )
